<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Document</title>
</head>
<body>
    <div class="center-box" id="cnt">
        <div class="color-picker-container">
            <div class="gradient-column rainbow">
                <input type="range" min="0" max="360" value="0" class="vertical-slider" id="hue-slider" orient="vertical">
            </div>
            <div class="gradient-column" id="white-col">
                <input type="range" min="0" max="100" value="0" class="vertical-slider" id="white-slider" orient="vertical">
            </div>

            <div class="gradient-column" id="black-col">
                <input type="range" min="0" max="100" value="0" class="vertical-slider" id="black-slider" orient="vertical">
            </div>
        </div>

        <div></div>
        <div class="timer" id="tmr">5.00</div>
    </div>
    <script src="main.js"></script>
</body>
</html>
